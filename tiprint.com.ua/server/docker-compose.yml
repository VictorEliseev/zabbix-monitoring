services:
  # --- База данных (TimescaleDB для лучшей производительности) ---
  zabbix-db:
    image: timescale/timescaledb:latest-pg16
    container_name: zabbix-db
    restart: always
    volumes:
      - ./zabbix-db-data:/var/lib/postgresql/data:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=${TIMEZONE}
    env_file:
      - .env

  # --- Ядро Zabbix Server ---
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    container_name: zabbix-server
    restart: always
    ports:
      - "10051:10051"
    volumes:
      - ./zabbix/alertscripts:/usr/lib/zabbix/alertscripts:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ZBX_SERVER_NAME=${ZBX_SERVER_NAME}
      - ZBX_CACHELINESIZE=128
      - PHP_TZ=${TIMEZONE}
    env_file:
      - .env
    depends_on:
      - zabbix-db

  # --- Веб-интерфейс (за прокси-менеджером) ---
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: zabbix-web
    restart: always
    expose:
      - "8080"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ZBX_SERVER_NAME=${ZBX_SERVER_NAME}
      - PHP_TZ=${TIMEZONE}
    env_file:
      - .env
    depends_on:
      - zabbix-db
      - zabbix-server

  # --- Nginx Proxy Manager (SSL и Доступ) ---
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy
    restart: always
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./nginx-proxy/data:/data
      - ./nginx-proxy/letsencrypt:/etc/letsencrypt
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TZ=${TIMEZONE}

  # --- Zabbix Agent (Мониторинг самого хоста) ---
  zabbix-agent:
    image: zabbix/zabbix-agent:alpine-7.0-latest
    container_name: zabbix-agent
    restart: always
    privileged: true
    network_mode: host
    volumes:
      - /proc:/host/proc
      - /sys:/host/sys
      - /:/host/rootfs:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - ZBX_HOSTNAME=${ZBX_HOSTNAME}
      - ZBX_SERVER_HOST=127.0.0.1
    env_file:
      - .env