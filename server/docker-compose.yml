services:
  # --- DATABASE / БАЗА ДАНИХ (TimescaleDB) ---
  # TimescaleDB provides high performance for time-series data
  # TimescaleDB забезпечує високу продуктивність для часових рядів
  zabbix-db:
    image: timescale/timescaledb:latest-pg16
    container_name: zabbix-db
    restart: always
    volumes:
      - ./data/db:/var/lib/postgresql/data:rw
      # Add this line to initialize the extension / Додаємо для ініціалізації
      - ./init_timescaledb.sql:/docker-entrypoint-initdb.d/init_timescaledb.sql:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=${TIMEZONE}
    env_file:
      - .env

  # --- TAILSCALE GATEWAY / ШЛЮЗ TAILSCALE ---
  # Entry point for branch proxies via secure tunnel
  # Точка входу для проксі філій через захищений тунель
  ts-server:
    image: tailscale/tailscale:latest
    container_name: ts-server
    hostname: ${TS_HOSTNAME_SERVER}
    restart: always
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ./data/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

  # --- ZABBIX SERVER / ЯДРО СЕРВЕРА ZABBIX ---
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    container_name: zabbix-server
    restart: always
    # Connects to the server network via Tailscale tunnel
    # Підключається до мережі через тунель Tailscale
    network_mode: "service:ts-server"
    volumes:
      - ./data/zbx_env/alertscripts:/usr/lib/zabbix/alertscripts:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ZBX_SERVER_NAME=${ZBX_SERVER_NAME}
      - ZBX_CACHELINESIZE=128
      - PHP_TZ=${TIMEZONE}
    env_file:
      - .env
    depends_on:
      - zabbix-db
      - ts-server

  # --- WEB INTERFACE / ВЕБ-ІНТЕРФЕЙС ZABBIX ---
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: zabbix-web
    restart: always
    expose:
      - "8080"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ZBX_SERVER_NAME=${ZBX_SERVER_NAME}
      - PHP_TZ=${TIMEZONE}
    env_file:
      - .env
    depends_on:
      - zabbix-db
      - zabbix-server

  # --- NGINX PROXY MANAGER (SSL & Reverse Proxy) ---
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy
    restart: always
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./data/npm/data:/data
      - ./data/npm/letsencrypt:/etc/letsencrypt
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TZ=${TIMEZONE}

  # --- ZABBIX AGENT (Self-Monitoring) / ZABBIX АГЕНТ (Самомоніторинг) ---
  # Monitors the Cloud Server health using the classic agent for stability
  # Моніторить стан хмарного сервера за допомогою класичного агента для стабільності
  zabbix-agent:
    image: zabbix/zabbix-agent:alpine-7.0-latest
    container_name: zabbix-agent
    restart: always
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      # Hostname must strictly match the name in Zabbix Web UI
      # Ім'я хоста має суворо збігатися з ім'ям у веб-інтерфейсі Zabbix
      - ZBX_HOSTNAME=${ZBX_HOSTNAME_SERVER}
      # Allowed server addresses for passive checks
      # Дозволені адреси сервера для пасивних перевірок
      - ZBX_SERVER_HOST=zabbix-server,172.17.0.1,127.0.0.1
    env_file:
      - .env
    depends_on:
      - zabbix-server