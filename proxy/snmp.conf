# --- SNMP CONFIGURATION / КОНФІГУРАЦІЯ SNMP ---

# Allow loading of all MIB modules to translate OIDs into human-readable text
# Дозволяємо завантаження всіх MIB-модулів для перекладу OID у зрозумілий текст
mibs +ALL

# Paths to MIB directories INSIDE the container (mapped via volumes in docker-compose)
# Шляхи до папок MIB-файлів ВСЕРЕДИНІ контейнера (прокинуті через volumes у docker-compose)
mibdirs /usr/share/snmp/mibs:/var/lib/mibs/ietf:/var/lib/mibs/iana