# --- SNMP TRAP LOG ROTATION / РОТАЦІЯ ЛОГІВ SNMP-ТРАПІВ ---

/var/lib/zabbix/snmptraps/snmptraps.log {
    # Rotate the log file when it reaches 10MB
    # Ротувати лог-файл, коли він досягає розміру 10 МБ
    size 10M

    # Keep 5 rotated log files before deleting the oldest one
    # Зберігати 5 ротованих файлів перед видаленням найстарішого
    rotate 5

    # Compress rotated log files (gzip) to save space
    # Стискати ротовані лог-файли (gzip) для економії місця
    compress

    # Do not report an error if the log file is missing
    # Не видавати помилку, якщо лог-файл відсутній
    missingok

    # Do not rotate the log if it is empty
    # Не ротувати лог, якщо він порожній
    notifempty

    # Truncate the original log file in place instead of moving it
    # Очищати оригінальний лог-файл на місці замість його переміщення
    # (Essential for Docker containers to avoid restarting)
    # (Важливо для Docker-контейнерів, щоб уникнути перезапуску)
    copytruncate
}