services:
  # --- TAILSCALE NETWORK GATEWAY / МЕРЕЖЕВИЙ ШЛЮЗ TAILSCALE ---
  # Provides a secure connection between the branch and the cloud server.
  # Забезпечує захищений зв'язок між філією та хмарним сервером.
  ts-gateway:
    # Используем конкретную стабильную версию вместо latest для надежности и предсказуемости
    image: tailscale/tailscale:v1.64.2
    container_name: ts-gateway
    hostname: ${TS_HOSTNAME}
    restart: always
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ROUTES=${TS_ROUTES}
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--snat-subnet-routes=false --accept-dns=false --ssh
    volumes:
      - ${PATH_TS_STATE}:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # Port for SNMP traps (UDP 162) / Порт для SNMP-трапів (UDP 162).
      - "162:162/udp"

  # --- PROXY DATABASE VOLUME / ТОМ БАЗИ ДАНИХ ПРОКСІ ---
  # Ensures correct permissions for SQLite database file.
  # Забезпечує коректні права доступу для файлу бази даних SQLite.
  zabbix-proxy-db:
    # Используем стабильную версию Alpine для надежности и предсказуемости
    image: alpine:3.19
    container_name: zabbix-proxy-db
    restart: always
    command: ["/bin/sh", "-c", "mkdir -p /var/lib/zabbix && chown -R 199:199 /var/lib/zabbix && tail -f /dev/null"]
    volumes:
      - ${PATH_ZBX_DB}:/var/lib/zabbix:rw

  # --- ZABBIX PROXY (SQLite3) / ZABBIX ПРОКСІ (SQLite3) ---
  # Collects data from the local network and sends it to the main server.
  # Збирає дані з локальної мережі та відправляє їх на основний сервер.
  zabbix-proxy:
    # # Фиксируем на 7.0.0
    image: zzabbix/zabbix-proxy-sqlite3:alpine-7.0.0
    container_name: zabbix-proxy
    restart: always
    network_mode: "service:ts-gateway"
    depends_on:
      - ts-gateway
      - zabbix-proxy-db
    environment:
      - ZBX_HOSTNAME=${ZBX_PROXY_NAME}
      - ZBX_SERVER_HOST=${ZBX_SERVER_HOST}
      - ZBX_DB_FILE=/var/lib/zabbix/zabbix_proxy.db
      - ZBX_ENABLERSNMPTRAPS=true
      - TZ=${TIMEZONE}
    volumes:
      - ${PATH_ZBX_DB}:/var/lib/zabbix:rw
      - ${PATH_SNMPTRAPS}:/var/lib/zabbix/snmptraps:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  # --- SNMP TRAP COLLECTOR / КОЛЕКТОР SNMP-ТРАПІВ ---
  # Receives traps from the network and writes them to a log file.
  # Приймає трапи з мережі та записує їх у лог-файл.
  trap-collector:
    # Используем стабильную версию Alpine для надежности и предсказуемости
    image: alpine:3.19
    container_name: trap-collector
    restart: always
    network_mode: "service:ts-gateway"
    entrypoint: /bin/sh /trap_run.sh
    volumes:
      - ./trap_run.sh:/trap_run.sh:ro
      - ${PATH_SNMPTRAPS}:/var/lib/zabbix/snmptraps:rw
    depends_on:
      - ts-gateway

  # --- ZABBIX AGENT (V1) / ZABBIX АГЕНТ (V1) ---
  # Monitors local host hardware and system resources using classic agent.
  # Моніторинг апаратних та системних ресурсів локального хоста через класичний агент.
  zabbix-agent:
    # Фиксируем версию агента
    image: zabbix/zabbix-agent:alpine-7.0.0
    container_name: zabbix-agent-proxy
    restart: always
    privileged: true
    network_mode: "service:ts-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - ZBX_HOSTNAME=${ZBX_HOSTNAME_PROXY_NODE}
      - ZBX_SERVER_HOST=${ZBX_AGENT_ALLOWED_SERVERS}
      - ZBX_PASSIVESERVER=${ZBX_AGENT_ALLOWED_SERVERS}
      - TZ=${TIMEZONE}
    depends_on:
      - ts-gateway